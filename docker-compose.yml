services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: organizations
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host port 5433 -> container port 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    # Pass all variables from project .env into the container
    env_file:
      - .env
    # Override DB connection strings for Docker networking.
    # Inside the container `localhost` doesn't point to the `db` service.
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/organizations
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/organizations
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
